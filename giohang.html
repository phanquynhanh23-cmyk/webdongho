<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ Hàng - Hzanh🥀</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-clock"></i>
            Hzanh🥀
        </div>

        <nav>
            <a href="index.html">Trang Chủ</a>
            <a href="nam.html">Nam</a>
            <a href="nu.html">Nữ</a>
            <a href="lienhe.html">Liên Hệ</a>

            <div class="dropdown">
                <a href="#">Lab Thực Hành ▼</a>
                <div class="dropdown-content">
                    <a href="#">Lab 1</a>
                    <a href="#">Lab 2</a>
                    <a href="#">Lab 3</a>
                    <a href="#">Lab 4</a>
                    <a href="#">Lab 5</a>
                </div>
            </div>
        </nav>

        <div class="cart" style="border: 1px solid gold; padding: 5px 10px; border-radius: 4px;">
            <i class="fa-solid fa-cart-shopping" style="color: gold;"></i>
            <span id="cart-count">0</span>
        </div>
    </header>

    <section style="padding: 50px 20px; max-width: 1200px; margin: 0 auto; color: #fff;">
        <h1 style="color: gold; text-align: center; margin-bottom: 40px;">
            <i class="fa-solid fa-bag-shopping"></i> GIỎ HÀNG CỦA BẠN
        </h1>

        <div style="display: flex; flex-wrap: wrap; gap: 30px;">
            <div id="cart-container" style="flex: 2; min-width: 350px;"></div>

            <div style="flex: 1; min-width: 300px; background: #1a1a1a; padding: 25px; border-radius: 8px; border: 1px solid #333; height: fit-content;">
                <h3 style="color: gold; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px;">THÔNG TIN ĐƠN HÀNG</h3>
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                    <span>Tổng sản phẩm:</span>
                    <span id="total-quantity" style="font-weight: bold; color: gold;">0</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px;">
                    <span>Thành tiền:</span>
                    <span id="total-price" style="font-weight: bold; color: gold; font-size: 1.2rem;">0 VNĐ</span>
                </div>

                <h4 style="color: #fff; margin-bottom: 15px;">Thông tin nhận hàng:</h4>
                <form id="checkoutForm" onsubmit="processCheckout(event)">
                    <input type="text" placeholder="Họ và tên người nhận" required style="width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 4px; border: 1px solid #444; background: #222; color: #fff;">
                    <input type="tel" placeholder="Số điện thoại nhận hàng" required style="width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 4px; border: 1px solid #444; background: #222; color: #fff;">
                    <input type="email" placeholder="Địa chỉ Gmail của bạn" required style="width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 4px; border: 1px solid #444; background: #222; color: #fff;">
                    <input type="text" placeholder="Địa chỉ giao hàng cụ thể" required style="width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 4px; border: 1px solid #444; background: #222; color: #fff;">
                    <button type="submit" style="width: 100%; padding: 12px; background: gold; color: #000; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase;">Xác Nhận Đặt Hàng</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <h3>Hzanh🥀</h3>
        <p>Email: Hzanh🥀@gmail.com</p>
        <p>Hotline: 0862894999</p>
        <p>© 2026 All Rights Reserved</p>
    </footer>

    <script src="scrip.js"></script>
    <script>
        // Hàm đọc dữ liệu từ LocalStorage và dựng giao diện sản phẩm trong giỏ
        function renderCart() {
            const cartList = JSON.parse(localStorage.getItem('cart')) || [];
            const container = document.getElementById('cart-container');
            const totalQtyEl = document.getElementById('total-quantity');
            const totalPriceEl = document.getElementById('total-price');
            
            // Trường hợp giỏ hàng trống không có sản phẩm
            if (cartList.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 40px; background: #1a1a1a; border-radius: 8px; border: 1px solid #333;">
                        <i class="fa-solid fa-folder-open" style="font-size: 3rem; color: #555; margin-bottom: 15px;"></i>
                        <p style="color: #aaa;">Giỏ hàng của bạn đang trống.</p>
                        <a href="nam.html" style="display: inline-block; margin-top: 15px; color: gold; text-decoration: none; border: 1px solid gold; padding: 8px 15px; border-radius: 4px;">Mua sắm ngay</a>
                    </div>`;
                totalQtyEl.innerText = '0';
                totalPriceEl.innerText = '0 VNĐ';
                return;
            }

            let htmlContent = '';
            let totalQuantity = 0;
            let totalMoney = 0;

            // Lặp qua từng sản phẩm để tạo mã HTML hiển thị
            cartList.forEach((item, index) => {
                const priceNum = parseInt(item.price.replace(/[^0-9]/g, ''));
                const subTotal = priceNum * item.quantity;
                totalQuantity += item.quantity;
                totalMoney += subTotal;

                htmlContent += `
                    <div style="display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333;">
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <img src="${item.img}" style="width: 70px; height: 70px; object-fit: cover; border-radius: 4px; border: 1px solid #333;">
                            <div>
                                <h4 style="color: #fff; margin-bottom: 5px;">${item.name}</h4>
                                <p style="color: gold; font-size: 0.9rem;">${item.price}</p>
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 20px;">
                            <div style="display: flex; align-items: center; background: #222; border: 1px solid #444; border-radius: 4px;">
                                <button onclick="changeQty(${index}, -1)" style="background: none; border: none; color: #fff; padding: 5px 10px; cursor: pointer; font-weight: bold;">-</button>
                                <span style="padding: 0 10px; color: gold; font-weight: bold;">${item.quantity}</span>
                                <button onclick="changeQty(${index}, 1)" style="background: none; border: none; color: #fff; padding: 5px 10px; cursor: pointer; font-weight: bold;">+</button>
                            </div>
                            <i class="fa-solid fa-trash-can" onclick="deleteItem(${index})" style="color: #ff4d4d; cursor: pointer; font-size: 1.1rem;"></i>
                        </div>
                    </div>`;
            });

            container.innerHTML = htmlContent;
            totalQtyEl.innerText = totalQuantity;
            totalPriceEl.innerText = totalMoney.toLocaleString('vi-VN') + ' VNĐ';
            
            const cartCountElement = document.getElementById('cart-count');
            if (cartCountElement) cartCountElement.innerText = totalQuantity;
        }

        // Hàm tăng giảm số lượng sản phẩm trực tiếp trên giao diện giỏ hàng
        window.changeQty = function(index, delta) {
            let cartList = JSON.parse(localStorage.getItem('cart')) || [];
            cartList[index].quantity += delta;
            if (cartList[index].quantity <= 0) cartList.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cartList));
            renderCart();
        }

        // Hàm xóa hẳn một sản phẩm khỏi danh sách giỏ hàng
        window.deleteItem = function(index) {
            let cartList = JSON.parse(localStorage.getItem('cart')) || [];
            cartList.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cartList));
            renderCart();
        }

        // Hàm xử lý khi người dùng nhấn nút bấm xác nhận thanh toán đơn hàng
        function processCheckout(e) {
            e.preventDefault();
            alert("Đặt hàng thành công! Thông tin đơn hàng của bạn đã được gửi lên hệ thống.\nHzanh🥀 sẽ gửi mail xác nhận đơn hàng cho bạn.");
            localStorage.removeItem('cart'); // Xóa giỏ hàng sau khi đặt thành công
            window.location.href = 'index.html'; // Quay lại trang chủ
        }

        // Kích hoạt hiển thị giỏ hàng ngay khi trang web tải xong cấu trúc DOM
        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
